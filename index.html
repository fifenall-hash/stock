<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ 종합 차트 (표준편차 설정 기능)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }
        .control-panel label {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        .control-panel input {
            width: 60px;
            padding: 6px;
            margin-left: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .btn-table {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }
        .chart-wrapper {
            position: relative;
            height: 60vh;
            min-height: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 8px;
        }
        .btn-container {
            text-align: center;
        }
        #table-container {
            display: none;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }
        th {
            background-color: #f1f1f1;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <h1>TQQQ Comprehensive Chart (1500-Day)</h1>
            <p>수정종가(파란선), 1500일 이평선(노란선), 볼린저밴드(회색 점선), 이격도(붉은선)</p>
        </div>

        <div class="control-panel">
            <label>상한선 표준편차 (+)<input type="number" id="upper-mult" step="0.1" value="2.0"></label>
            <label>하한선 표준편차 (-)<input type="number" id="lower-mult" step="0.1" value="2.0"></label>
            <button class="btn" onclick="updateBandsAndRender()">차트 재적용</button>
        </div>
        
        <div class="chart-wrapper">
            <div id="loading">초기 데이터를 분석하고 계산하는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(최대 5초 정도 소요될 수 있습니다)</span></div>
            <canvas id="myChart"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn btn-table" onclick="toggleTable()">일봉 Raw 데이터 표 보기/숨기기</button>
        </div>

        <div id="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>수정종가 (USD)</th>
                        <th>1500일 이평선</th>
                        <th id="th-upper-bb">BB 상한 (2σ)</th>
                        <th id="th-lower-bb">BB 하한 (2σ)</th>
                        <th>1500일 이격도 (배수)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const symbol = 'TQQQ';
        const currentUnixTime = Math.floor(Date.now() / 1000); 
        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=0&period2=${currentUnixTime}&interval=1d`;

        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        // 빠른 재계산을 위한 데이터 캐싱 변수
        let cachedData = null;

        async function fetchWithFallback() {
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.chart && data.chart.result) return data;
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, error);
                }
            }
            throw new Error('데이터 로드 실패');
        }

        async function initDataFetch() {
            try {
                const rawData = await fetchWithFallback();
                const result = rawData.chart.result[0];
                
                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = [];
                let prices = [];
                let smaData = [];
                let stdDevData = []; // 순수 표준편차 값만 따로 저장
                let disparityData = [];
                let validDisparities = [];
                
                const MA_PERIOD = 1500;
                let windowPrices = [];

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) {
                        continue;
                    }

                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);
                    windowPrices.push(currentPrice);

                    if (windowPrices.length > MA_PERIOD) {
                        windowPrices.shift();
                    }

                    if (windowPrices.length === MA_PERIOD) {
                        const sum = windowPrices.reduce((a, b) => a + b, 0);
                        const average = sum / MA_PERIOD;
                        
                        let sqSum = 0;
                        for (let j = 0; j < MA_PERIOD; j++) {
                            sqSum += Math.pow(windowPrices[j] - average, 2);
                        }
                        const stdDev = Math.sqrt(sqSum / MA_PERIOD);

                        if (average > 0) {
                            const disparity = currentPrice / average; 
                            
                            smaData.push(average);
                            stdDevData.push(stdDev);
                            
                            if (Number.isFinite(disparity)) {
                                disparityData.push(disparity);
                                validDisparities.push(disparity);
                            } else {
                                disparityData.push(null);
                            }
                        } else {
                            smaData.push(null);
                            stdDevData.push(null);
                            disparityData.push(null);
                        }
                    } else {
                        smaData.push(null);
                        stdDevData.push(null);
                        disparityData.push(null);
                    }
                }

                // 처리된 원본 데이터를 전역 변수에 저장
                cachedData = {
                    dates: dates,
                    prices: prices,
                    smaData: smaData,
                    stdDevData: stdDevData,
                    disparityData: disparityData,
                    validDisparities: validDisparities
                };

                updateBandsAndRender(); // 렌더링 함수 호출
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '데이터 연동에 실패했습니다.<br>잠시 후 다시 시도해 주세요.';
                document.getElementById('loading').style.color = 'red';
            }
        }

        // 사용자가 입력한 표준편차 배수를 적용하여 선을 재계산하는 함수
        function updateBandsAndRender() {
            if (!cachedData) return;

            const upperMult = parseFloat(document.getElementById('upper-mult').value) || 2.0;
            const lowerMult = parseFloat(document.getElementById('lower-mult').value) || 2.0;

            // 표 헤더 텍스트 동적 업데이트
            document.getElementById('th-upper-bb').innerText = `BB 상한 (${upperMult}σ)`;
            document.getElementById('th-lower-bb').innerText = `BB 하한 (${lowerMult}σ)`;

            let upperBBData = [];
            let lowerBBData = [];

            // 저장된 순수 표준편차와 이평선을 바탕으로 곱하기(배수) 연산만 빠르게 수행
            for (let i = 0; i < cachedData.smaData.length; i++) {
                const sma = cachedData.smaData[i];
                const stdDev = cachedData.stdDevData[i];

                if (sma !== null && stdDev !== null) {
                    upperBBData.push(sma + (upperMult * stdDev));
                    lowerBBData.push(Math.max(sma - (lowerMult * stdDev), 0.0001));
                } else {
                    upperBBData.push(null);
                    lowerBBData.push(null);
                }
            }

            let maxDisp = 5, minDisp = 0;
            if (cachedData.validDisparities.length > 0) {
                maxDisp = Math.max(...cachedData.validDisparities);
                minDisp = Math.min(...cachedData.validDisparities);
            }

            renderChart(
                cachedData.dates, 
                cachedData.prices, 
                cachedData.smaData, 
                upperBBData, 
                lowerBBData, 
                cachedData.disparityData, 
                maxDisp, 
                minDisp,
                upperMult,
                lowerMult
            );

            populateTable(
                cachedData.dates, 
                cachedData.prices, 
                cachedData.smaData, 
                upperBBData, 
                lowerBBData, 
                cachedData.disparityData
            );
        }

        function renderChart(labels, priceData, smaData, upperBBData, lowerBBData, disparityData, maxDisp, minDisp, upperMult, lowerMult) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (window.myLineChart) {
                window.myLineChart.destroy();
            }
            
            window.myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TQQQ 수정종가 (로그스케일)',
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1,
                            order: 1
                        },
                        {
                            label: '1500일 이동평균선',
                            data: smaData,
                            borderColor: '#f1c40f',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1,
                            spanGaps: true,
                            order: 3
                        },
                        {
                            label: `볼린저밴드 상한 (${upperMult}σ)`,
                            data: upperBBData,
                            borderColor: '#95a5a6',
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1,
                            spanGaps: true,
                            order: 4
                        },
                        {
                            label: `볼린저밴드 하한 (${lowerMult}σ)`,
                            data: lowerBBData,
                            borderColor: '#95a5a6',
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1,
                            spanGaps: true,
                            order: 5
                        },
                        {
                            label: '1500일 이격 비율 (배수)',
                            data: disparityData,
                            borderColor: '#e74c3c',
                            borderWidth: 2, 
                            pointRadius: 0,
                            yAxisID: 'y1',
                            tension: 0.1,
                            spanGaps: true,
                            order: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        if (context.dataset.yAxisID === 'y1') {
                                            label += context.parsed.y.toFixed(2) + 'x';
                                        } else {
                                            label += context.parsed.y.toFixed(2);
                                        }
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'logarithmic',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '수정종가 및 지표 (USD)', color: '#3498db' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격 비율 (현재가 / 1500일 평균)', color: '#e74c3c' },
                            grid: { drawOnChartArea: false },
                            min: minDisp, 
                            max: maxDisp 
                        }
                    }
                }
            });
        }

        function populateTable(dates, prices, smaData, upperBBData, lowerBBData, disparityData) {
            const tableBody = document.getElementById('table-body');
            let htmlContent = '';

            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const price = prices[i] ? prices[i].toFixed(4) : 'N/A';
                
                const sma = smaData[i] !== null ? smaData[i].toFixed(4) : '-';
                const upperBB = upperBBData[i] !== null ? upperBBData[i].toFixed(4) : '-';
                const lowerBB = lowerBBData[i] !== null ? lowerBBData[i].toFixed(4) : '-';
                const disparity = disparityData[i] !== null ? disparityData[i].toFixed(4) : '<span style="color:#999;">데이터 부족(1500일 미만)</span>';

                htmlContent += `
                    <tr>
                        <td>${date}</td>
                        <td>${price}</td>
                        <td>${sma}</td>
                        <td>${upperBB}</td>
                        <td>${lowerBB}</td>
                        <td>${disparity}</td>
                    </tr>
                `;
            }
            tableBody.innerHTML = htmlContent;
        }

        function toggleTable() {
            const container = document.getElementById('table-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        // 스크립트 실행
        initDataFetch();
    </script>
</body>
</html>
