<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ 수정종가 및 1500일 이격도</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .chart-wrapper {
            position: relative;
            height: 60vh;
            min-height: 400px;
            width: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <h1>TQQQ Price & 1500-Day Disparity Ratio</h1>
            <p>액면분할 반영 수정종가 (파란선: 주가 / 붉은선: 1500일 이격 배수)</p>
        </div>
        
        <div class="chart-wrapper">
            <div id="loading">데이터를 분석하고 계산하는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(최대 5초 정도 소요될 수 있습니다)</span></div>
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        const symbol = 'TQQQ';
        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=max&interval=1d`;

        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        async function fetchWithFallback() {
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.chart && data.chart.result) return data;
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, error);
                }
            }
            throw new Error('데이터 로드 실패');
        }

        async function fetchAndRenderChart() {
            try {
                const rawData = await fetchWithFallback();
                const result = rawData.chart.result[0];
                
                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = [];
                let prices = [];
                let disparityData = [];
                let validDisparities = []; // Y축 최댓값 계산을 위해 정상 값만 모아두는 배열
                
                const MA_PERIOD = 1500;
                let windowPrices = [];

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) {
                        continue;
                    }

                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);
                    windowPrices.push(currentPrice);

                    if (windowPrices.length > MA_PERIOD) {
                        windowPrices.shift();
                    }

                    if (windowPrices.length === MA_PERIOD) {
                        const sum = windowPrices.reduce((a, b) => a + b, 0);
                        const average = sum / MA_PERIOD;
                        
                        if (average > 0) {
                            // 요청하신 공식: 해당 날짜의 종가를 지난 1500일간 종가 평균으로 나눔
                            const disparity = currentPrice / average; 
                            
                            if (Number.isFinite(disparity)) {
                                disparityData.push(disparity);
                                validDisparities.push(disparity);
                            } else {
                                disparityData.push(null);
                            }
                        } else {
                            disparityData.push(null);
                        }
                    } else {
                        disparityData.push(null);
                    }
                }

                // 이격도 데이터 중 최댓값을 찾아 Y축 스케일을 여유 있게(+1) 설정
                const maxDisparityValue = validDisparities.length > 0 ? Math.ceil(Math.max(...validDisparities) + 1) : 5;

                renderChart(dates, prices, disparityData, maxDisparityValue);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '데이터 연동에 실패했습니다.<br>잠시 후 다시 시도해 주세요.';
                document.getElementById('loading').style.color = 'red';
            }
        }

        function renderChart(labels, priceData, disparityData, maxDisp) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (window.myLineChart) {
                window.myLineChart.destroy();
            }
            
            window.myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TQQQ 수정종가 (로그형)',
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1
                        },
                        {
                            label: '1500일 이격 비율 (배수)',
                            data: disparityData,
                            borderColor: '#e74c3c', 
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2, 
                            pointRadius: 0,
                            yAxisID: 'y1',
                            tension: 0.1,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        // 이격도 값인 경우 'x' (배수)를 붙여서 출력
                                        if (context.datasetIndex === 1) {
                                            label += context.parsed.y.toFixed(2) + 'x';
                                        } else {
                                            label += context.parsed.y.toFixed(2);
                                        }
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'logarithmic',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '수정종가 (USD)', color: '#3498db' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격 비율 (현재가 / 1500일 평균)', color: '#e74c3c' },
                            grid: { drawOnChartArea: false },
                            // 계산된 최댓값을 바탕으로 Y축 범위를 강제로 설정하여 버그 원천 차단
                            min: 0, 
                            max: maxDisp 
                        }
                    }
                }
            });
        }

        fetchAndRenderChart();
    </script>
</body>
</html>
