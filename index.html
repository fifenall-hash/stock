<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ 일봉 차트 및 1500일 이격도</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .chart-wrapper {
            position: relative;
            height: 50vh;
            min-height: 400px;
            width: 100%;
            margin-bottom: 20px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 8px;
        }
        .btn-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        #table-container {
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }
        th {
            background-color: #f1f1f1;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <h1>TQQQ Price & 1500-Day Disparity Ratio</h1>
            <p>액면분할 반영 일봉(Daily) 수정종가 (파란선: 주가 / 붉은선: 1500일 이격 배수)</p>
        </div>
        
        <div class="chart-wrapper">
            <div id="loading">데이터를 분석하고 계산하는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(최대 5초 정도 소요될 수 있습니다)</span></div>
            <canvas id="myChart"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn" onclick="toggleTable()">일봉 Raw 데이터 표 보기/숨기기</button>
        </div>

        <div id="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>수정종가 (USD)</th>
                        <th>1500일 이격도 (배수)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const symbol = 'TQQQ';
        // 핵심 수정: range=max 대신 UNIX 타임스탬프를 명시하여 야후 서버가 강제로 월봉으로 압축하는 것을 차단
        const currentUnixTime = Math.floor(Date.now() / 1000); 
        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=0&period2=${currentUnixTime}&interval=1d`;

        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        async function fetchWithFallback() {
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.chart && data.chart.result) return data;
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, error);
                }
            }
            throw new Error('데이터 로드 실패');
        }

        async function fetchAndRenderChart() {
            try {
                const rawData = await fetchWithFallback();
                const result = rawData.chart.result[0];
                
                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = [];
                let prices = [];
                let disparityData = [];
                let validDisparities = [];
                
                const MA_PERIOD = 1500;
                let windowPrices = [];

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) {
                        continue;
                    }

                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);
                    windowPrices.push(currentPrice);

                    if (windowPrices.length > MA_PERIOD) {
                        windowPrices.shift();
                    }

                    if (windowPrices.length === MA_PERIOD) {
                        const sum = windowPrices.reduce((a, b) => a + b, 0);
                        const average = sum / MA_PERIOD;
                        
                        if (average > 0) {
                            const disparity = currentPrice / average; 
                            
                            if (Number.isFinite(disparity)) {
                                disparityData.push(disparity);
                                validDisparities.push(disparity);
                            } else {
                                disparityData.push(null);
                            }
                        } else {
                            disparityData.push(null);
                        }
                    } else {
                        disparityData.push(null);
                    }
                }

                const maxDisparityValue = validDisparities.length > 0 ? Math.ceil(Math.max(...validDisparities) + 1) : 5;

                renderChart(dates, prices, disparityData, maxDisparityValue);
                populateTable(dates, prices, disparityData);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '데이터 연동에 실패했습니다.<br>잠시 후 다시 시도해 주세요.';
                document.getElementById('loading').style.color = 'red';
            }
        }

        function renderChart(labels, priceData, disparityData, maxDisp) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (window.myLineChart) {
                window.myLineChart.destroy();
            }
            
            window.myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TQQQ 일봉 수정종가 (로그스케일)',
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1
                        },
                        {
                            label: '1500일 이격 비율 (배수)',
                            data: disparityData,
                            borderColor: '#e74c3c', 
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2, 
                            pointRadius: 0,
                            yAxisID: 'y1',
                            tension: 0.1,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        if (context.datasetIndex === 1) {
                                            label += context.parsed.y.toFixed(2) + 'x';
                                        } else {
                                            label += context.parsed.y.toFixed(2);
                                        }
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'logarithmic',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '수정종가 (USD)', color: '#3498db' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격 비율 (현재가 / 1500일 평균)', color: '#e74c3c' },
                            grid: { drawOnChartArea: false },
                            min: 0, 
                            max: maxDisp 
                        }
                    }
                }
            });
        }

        function populateTable(dates, prices, disparityData) {
            const tableBody = document.getElementById('table-body');
            let htmlContent = '';

            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const price = prices[i] ? prices[i].toFixed(4) : 'N/A';
                const disparity = disparityData[i] !== null ? disparityData[i].toFixed(4) : '<span style="color:#999;">데이터 부족(1500일 미만)</span>';

                htmlContent += `
                    <tr>
                        <td>${date}</td>
                        <td>${price}</td>
                        <td>${disparity}</td>
                    </tr>
                `;
            }
            tableBody.innerHTML = htmlContent;
        }

        function toggleTable() {
            const container = document.getElementById('table-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        fetchAndRenderChart();
    </script>
</body>
</html>
