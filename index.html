<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주식 커스텀 분석 및 매매 최적화 시스템</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stock Analytics">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        /* 터치 및 스크롤 충돌 방지 */
        canvas {
            touch-action: pan-y !important; /* 위아래 스크롤 허용, 좌우는 차트 이동 */
        }
        #scatterChart, #tradeOptimizerChart {
            touch-action: none !important; /* 모달창 내 산점도는 전체 터치 제어 허용 */
        }

        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 15px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 22px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 13px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }
        .control-panel label {
            font-size: 13px;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        .control-panel input, .control-panel select {
            padding: 6px;
            margin-left: 5px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            color: #2c3e50;
        }
        .control-panel input[type="number"] {
            width: 70px;
        }
        #ticker-input {
            width: 80px;
            text-transform: uppercase;
            font-weight: bold;
            color: #e74c3c;
        }
        .btn-group {
            width: 100%;
            text-align: center;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            flex: 1 1 auto;
        }
        .btn:hover { background-color: #1a252f; }
        .btn-optimize { background-color: #8e44ad; }
        .btn-optimize:hover { background-color: #732d91; }
        .btn-trade-opt { background-color: #d35400; }
        .btn-trade-opt:hover { background-color: #a04000; }
        .btn-info { background-color: #2980b9; }
        .btn-info:hover { background-color: #2471a3; }
        .btn-apply-selected { background-color: #2980b9; }
        .btn-apply-selected:hover { background-color: #1f618d; }
        .btn-apply-selected:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-reset { background-color: #7f8c8d; }
        .btn-reset:hover { background-color: #636e72; }
        .btn-download { background-color: #27ae60; margin-top: 10px; }
        .btn-download:hover { background-color: #219653; }
        
        .evaluation-panel {
            display: none; 
            background-color: #e8f4f8;
            border: 1px solid #bce8f1;
            color: #31708f;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            line-height: 1.8;
            word-break: keep-all;
        }
        .simulation-panel {
            display: none; 
            background-color: #fdfbf7;
            border: 1px solid #f5b041;
            color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            line-height: 1.6;
        }
        .eval-highlight {
            color: #e74c3c;
            font-size: 20px;
            margin: 0 3px;
        }
        .eval-capital {
            color: #d35400;
            font-size: 28px;
            margin: 5px 0;
            display: inline-block;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        .main-chart { height: 45vh; min-height: 350px; }
        .sub-chart { height: 30vh; min-height: 250px; }
        
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            width: 80%;
            max-width: 300px;
        }
        .btn-container { text-align: center; }
        #table-container { display: none; }

        /* 모달창 CSS 공통 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .opt-chart-container {
            position: relative;
            height: 350px;
            width: 100%;
            margin-bottom: 15px;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div id="optimizer-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0;">📈 기준일수 최적화 분석기 (R² 기반)</h2>
            <div class="opt-chart-container">
                <canvas id="optimizerChart"></canvas>
            </div>
            <p id="opt-result-text" style="font-size:16px; font-weight:bold; margin:15px 0;">연산 중입니다...</p>
            <div class="modal-actions">
                <button id="opt-apply-btn" class="btn btn-download" style="display:none; margin:0;" onclick="applyOptimization()">적용하기</button>
                <button class="btn btn-reset" style="margin:0;" onclick="resetChartZoom(optChartInstance)">🔍 줌 초기화</button>
                <button class="btn" style="margin:0;" onclick="closeModal('optimizer-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="trade-optimizer-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0; color:#d35400;">📊 매수/매도 타점 최적화</h2>
            <div class="opt-chart-container">
                <canvas id="tradeOptimizerChart"></canvas>
            </div>
            <p id="trade-opt-result-text" style="font-size:16px; font-weight:bold; margin:15px 0;">모든 매수/매도 조합을 시뮬레이션 중입니다...</p>
            <div class="modal-actions">
                <button id="trade-opt-apply-btn" class="btn btn-trade-opt" style="display:none; margin:0;" onclick="applyTradeOptimization()">최고 효율 타점 적용하기</button>
                <button id="custom-apply-btn" class="btn btn-apply-selected" style="margin:0;" disabled onclick="applySelectedPoint()">해당 타점 적용하기</button>
                <button class="btn btn-reset" style="margin:0;" onclick="resetChartZoom(tradeOptChartInstance)">🔍 줌 초기화</button>
                <button class="btn" style="margin:0;" onclick="closeModal('trade-optimizer-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="timeseries-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0; color:#2c3e50;">📅 날짜별 이격도 & 물림일수 추이</h2>
            <div class="opt-chart-container">
                <canvas id="timeseriesChart"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn btn-reset" style="margin:0;" onclick="resetChartZoom(timeseriesChartInstance)">🔍 줌 초기화</button>
                <button class="btn" style="margin:0;" onclick="closeModal('timeseries-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="scatter-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0; color:#2c3e50;">📈 상관관계 산점도 및 추세선</h2>
            <div class="opt-chart-container">
                <canvas id="scatterChart"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn btn-reset" style="margin:0;" onclick="resetChartZoom(scatterChartInstance)">🔍 줌 초기화</button>
                <button class="btn" style="margin:0;" onclick="closeModal('scatter-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div class="widget-container">
        <div class="header">
            <h1 id="main-title">Custom Analytics & Simulator</h1>
            <p>매수, 매도 이격도 지점을 설정하여 최적의 수익률을 시뮬레이션 해보세요.<br><span style="font-size:12px; color:#95a5a6;">(PC: Ctrl+휠 확대 / 모바일: 두 손가락 확대)</span></p>
        </div>

        <div class="control-panel">
            <label>시장
                <select id="market-select">
                    <option value="">미국</option>
                    <option value=".KS">한국(코스피)</option>
                    <option value=".KQ">한국(코스닥)</option>
                </select>
            </label>
            <label>종목 <input type="text" id="ticker-input" value="TQQQ"></label>
            <label>이평 기준일수 <input type="number" id="ma-period" value="1500" min="1"></label>
            
            <div style="width: 100%; height: 0;"></div> 
            
            <label>초기 자본 <input type="number" id="initial-cap" value="10000" min="1"></label>
            <label style="color:#27ae60;">매수(이하) <input type="number" id="buy-point" step="0.05" value="1.5"></label>
            <label style="color:#e74c3c;">매도(이상) <input type="number" id="sell-point" step="0.05" value="3.0"></label>
            
            <div class="btn-group">
                <button class="btn" onclick="handleRenderClick()">데이터 갱신 및 시뮬레이션</button>
            </div>
            <div class="btn-group" style="margin-top: 5px;">
                <button class="btn btn-trade-opt" onclick="openTradeOptimizer()">📊 매수/매도 최적화</button>
                <button class="btn btn-optimize" onclick="openOptimizer()">💡 기준일수 최적화 (R²)</button>
            </div>
            <div class="btn-group" style="margin-top: 5px;">
                <button class="btn btn-info" onclick="openTimeseriesModal()">📅 이격도 vs 물림일수</button>
                <button class="btn btn-info" onclick="openScatterModal()">📈 이격-물림 산점도</button>
                <button class="btn btn-reset" onclick="resetMainChartsZoom()">🔍 차트 줌 초기화</button>
            </div>
        </div>

        <div id="simulation-panel" class="simulation-panel"></div>
        <div id="evaluation-panel" class="evaluation-panel"></div>
        
        <div class="chart-wrapper main-chart">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-wrapper sub-chart">
            <canvas id="disparityChart"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn btn-download" onclick="downloadCSV()">⬇️ 일봉 데이터 표 다운로드 (.csv)</button>
        </div>

        <div id="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>수정종가</th>
                        <th>N일 이평선</th>
                        <th>N일 이격도</th>
                        <th>물림일수(일)</th>
                        <th>매매 상태</th>
                        <th>총 자산</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }

        let cachedTicker = '';
        let cachedCompanyName = 'TQQQ';
        let cachedData = null;
        
        let priceChartInstance = null;
        let disparityChartInstance = null;
        let optChartInstance = null;
        let tradeOptChartInstance = null;
        let timeseriesChartInstance = null;
        let scatterChartInstance = null;
        
        let bestOptimizedPeriod = 1500;
        let bestOptimizedBuy = 1.5;
        let bestOptimizedSell = 3.0;

        window.currentAnalysis = null;
        window.selectedPointFromChart = null; 

        // --- 공통 모달 및 Zoom 제어 로직 ---
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function resetChartZoom(chartInstance) {
            if (chartInstance) {
                chartInstance.resetZoom();
            }
        }

        function resetMainChartsZoom() {
            resetChartZoom(priceChartInstance);
            resetChartZoom(disparityChartInstance);
        }

        // 플러그인 Zoom 옵션 설정 (안정화 됨)
        const zoomPluginX = {
            pan: { enabled: true, mode: 'x' },
            zoom: { 
                wheel: { enabled: true, modifierKey: 'ctrl' }, 
                pinch: { enabled: true }, 
                mode: 'x' 
            }
        };

        const zoomPluginXY = {
            pan: { enabled: true, mode: 'xy' },
            zoom: { 
                wheel: { enabled: true, modifierKey: 'ctrl' }, 
                pinch: { enabled: true }, 
                mode: 'xy' 
            }
        };

        async function handleRenderClick() {
            let rawTicker = document.getElementById('ticker-input').value.trim().toUpperCase();
            const marketSuffix = document.getElementById('market-select').value;
            
            const buyPt = parseFloat(document.getElementById('buy-point').value);
            const sellPt = parseFloat(document.getElementById('sell-point').value);
            
            if (!rawTicker) return alert('티커명 혹은 6자리 종목코드를 입력해주세요.');
            if (buyPt >= sellPt) return alert('매수 지점은 반드시 매도 지점보다 작아야 합니다.');

            let inputTicker = rawTicker;
            if (marketSuffix !== "" && !rawTicker.includes(".")) {
                inputTicker = rawTicker + marketSuffix;
            }

            if (inputTicker !== cachedTicker) {
                await fetchNewData(inputTicker);
            } else {
                calculateAndRender();
            }
        }

        async function fetchNewData(ticker) {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = `${ticker} 데이터를 불러오는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(야후 서버 응답 대기 중)</span>`;
            loadingEl.style.color = '#3498db';

            // [핵심 수정] 15일 간격 점프 방지 (range=max, interval=1d 사용)
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=max&interval=1d`;

            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
            ];

            try {
                let dataFetched = null;
                for (let proxy of proxyList) {
                    try {
                        const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.chart && data.chart.result) { dataFetched = data; break; }
                        }
                    } catch (error) { console.warn(`Proxy fail:`, error); }
                }

                if (!dataFetched) throw new Error('데이터 로드 실패');

                const result = dataFetched.chart.result[0];
                const meta = result.meta;
                const companyName = meta.shortName || meta.longName || ticker;
                cachedCompanyName = companyName;

                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = []; let prices = [];
                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) continue;
                    const dateObj = new Date(timestamps[i] * 1000);
                    dates.push(dateObj.toISOString().split('T')[0]);
                    prices.push(currentPrice);
                }

                const N = prices.length;
                let rawMulrimData = new Array(N).fill(0);
                let maxMulrim = 0;
                for (let i = 0; i < N; i++) {
                    let count = 0;
                    let currentPrice = prices[i];
                    for (let j = i + 1; j < N; j++) { if (prices[j] < currentPrice) count++; }
                    rawMulrimData[i] = count;
                    if (count > maxMulrim) maxMulrim = count;
                }

                cachedData = { dates: dates, prices: prices, rawMulrimData: rawMulrimData, maxMulrim: maxMulrim };
                cachedTicker = ticker;
                document.getElementById('main-title').innerText = `${companyName} 시뮬레이터`;
                loadingEl.style.display = 'none';
                calculateAndRender(); 

            } catch (error) {
                console.error(error);
                loadingEl.innerHTML = `데이터 통신에 실패했습니다.<br><span style="font-size:13px;">상장폐지 여부나 종목코드를 다시 확인해 주세요.</span>`;
                loadingEl.style.color = '#e74c3c';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 3000);
            }
        }

        function calculateAndRender() {
            if (!cachedData) return;

            const period = parseInt(document.getElementById('ma-period').value) || 1500;
            const initialCap = parseFloat(document.getElementById('initial-cap').value) || 10000;
            const buyPoint = parseFloat(document.getElementById('buy-point').value) || 1.5;
            const sellPoint = parseFloat(document.getElementById('sell-point').value) || 3.0;

            if(buyPoint >= sellPoint) {
                alert("매수 지점은 매도 지점보다 반드시 작아야 합니다.");
                return;
            }

            let smaData = [], disparityData = [], validDisparities = [], windowPrices = [];
            const N = cachedData.prices.length;
            const maxMulrim = cachedData.maxMulrim;
            const rawMulrimData = cachedData.rawMulrimData;

            // 1. 이평선 및 이격도 계산
            for (let i = 0; i < N; i++) {
                const currentPrice = cachedData.prices[i];
                windowPrices.push(currentPrice);
                if (windowPrices.length > period) windowPrices.shift();

                if (windowPrices.length === period) {
                    const average = windowPrices.reduce((a, b) => a + b, 0) / period;
                    if (average > 0) {
                        const disparity = currentPrice / average; 
                        smaData.push(average);
                        if (Number.isFinite(disparity)) { disparityData.push(disparity); validDisparities.push(disparity); } 
                        else disparityData.push(null);
                    } else { smaData.push(null); disparityData.push(null); }
                } else { smaData.push(null); disparityData.push(null); }
            }

            let avgDisparity = validDisparities.length > 0 ? validDisparities.reduce((a, b) => a + b, 0) / validDisparities.length : 0;
            
            // 2. 기준선 데이터 생성
            let disparityBaseLineData = [], disparityBuyLineData = [], disparitySellLineData = [];
            let disparityAvgLineData = [], priceAvgDisparityLineData = [];
            let priceBuyLineData = [], priceSellLineData = [];

            for (let i = 0; i < N; i++) {
                if (disparityData[i] !== null) {
                    disparityBaseLineData.push(1.0); 
                    disparityAvgLineData.push(avgDisparity);
                    disparityBuyLineData.push(buyPoint);
                    disparitySellLineData.push(sellPoint);
                    priceAvgDisparityLineData.push(smaData[i] * avgDisparity);
                    priceBuyLineData.push(smaData[i] * buyPoint); 
                    priceSellLineData.push(smaData[i] * sellPoint); 
                } else {
                    disparityBaseLineData.push(null); disparityAvgLineData.push(null); 
                    disparityBuyLineData.push(null); disparitySellLineData.push(null);
                    priceAvgDisparityLineData.push(null); priceBuyLineData.push(null); priceSellLineData.push(null);
                }
            }

            // 3. 백테스트
            let firstValidIdx = disparityData.findIndex(d => d !== null);
            if (firstValidIdx === -1) firstValidIdx = 0; 

            let isHolding = true;
            let cash = 0;
            let shares = initialCap / cachedData.prices[firstValidIdx]; 
            
            let tradeActions = new Array(N).fill("-");
            let capitalHistory = new Array(N).fill(null);

            tradeActions[firstValidIdx] = "초기 보유 시작";

            for (let i = 0; i < firstValidIdx; i++) {
                capitalHistory[i] = initialCap;
            }

            for (let i = firstValidIdx; i < N; i++) {
                let d = disparityData[i];
                let p = cachedData.prices[i];
                
                if (d !== null) {
                    if (isHolding && d > sellPoint && shares > 0) {
                        cash = shares * p;
                        shares = 0;
                        isHolding = false;
                        tradeActions[i] = "매도 (Sell)";
                    } else if (!isHolding && d < buyPoint && cash > 0) {
                        shares = cash / p;
                        cash = 0;
                        isHolding = true;
                        tradeActions[i] = "매수 (Buy)";
                    }
                }
                capitalHistory[i] = cash + (shares * p);
            }
            let finalCapital = capitalHistory[N - 1];

            const startDateStr = cachedData.dates[firstValidIdx];
            const endDateStr = cachedData.dates[N - 1];
            const startDt = new Date(startDateStr);
            const endDt = new Date(endDateStr);
            const diffTime = Math.abs(endDt - startDt);
            const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let totalYears = totalDays / 365.2425;
            if (totalYears <= 0) totalYears = 0.001; 
            
            const cagr = (Math.pow(finalCapital / initialCap, 1 / totalYears) - 1) * 100;

            // 4. 물림일수 필터링
            let displayMulrimData = new Array(N);
            let safeMulrimData = new Array(N); 
            for (let i = 0; i < N; i++) {
                if ((N - 1) - i < maxMulrim) {
                    displayMulrimData[i] = "데이터 부족";
                    safeMulrimData[i] = null;
                } else {
                    displayMulrimData[i] = rawMulrimData[i];
                    safeMulrimData[i] = rawMulrimData[i];
                }
            }

            // 5. 회귀분석
            let rSquared = 0, slope = 0, intercept = 0, validX = [], validY = [];
            for (let i = 0; i < N; i++) {
                if (disparityData[i] !== null && safeMulrimData[i] !== null) {
                    validX.push(disparityData[i]); validY.push(safeMulrimData[i]);
                }
            }

            if (validX.length > 1) {
                let sumX = 0, sumY = 0;
                for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
                let meanX = sumX / validX.length, meanY = sumY / validY.length;
                let covXY = 0, varX = 0, varY = 0;
                for (let i = 0; i < validX.length; i++) {
                    let dx = validX[i] - meanX, dy = validY[i] - meanY;
                    covXY += dx * dy; varX += dx * dx; varY += dy * dy;
                }
                if (varX > 0 && varY > 0) {
                    rSquared = (covXY / Math.sqrt(varX * varY)) ** 2;
                    slope = covXY / varX;
                    intercept = meanY - slope * meanX;
                }
            }

            let maxDisp = 5, minDisp = 0;
            if (validDisparities.length > 0) {
                maxDisp = Math.max(...validDisparities, 1.0, sellPoint, avgDisparity);
                minDisp = Math.min(...validDisparities, 1.0, buyPoint, avgDisparity);
            }

            window.currentAnalysis = {
                dates: cachedData.dates, disparity: disparityData, mulrim: safeMulrimData,
                slope: slope, intercept: intercept, minDisp: minDisp, maxDisp: maxDisp, period: period
            };

            const simPanel = document.getElementById('simulation-panel');
            const evalPanel = document.getElementById('evaluation-panel');
            
            if (validDisparities.length > 0) {
                const latestDate = cachedData.dates[N - 1];
                const latestPrice = cachedData.prices[N - 1]; 
                const latestDisparity = validDisparities[validDisparities.length - 1];
                let riskLevel = maxDisp > minDisp ? ((latestDisparity - minDisp) / (maxDisp - minDisp)) * 100 : 0;
                let expectedMulrim = Math.max(0, Math.round(slope * latestDisparity + intercept)) || 0;

                simPanel.innerHTML = `<div style="font-size: 16px; color:#7f8c8d; margin-bottom:5px;">📊 시뮬레이션 결과</div>` +
                                     `<div style="font-size: 14px; font-weight: normal; color: #555;">실수행 기간: ${startDateStr} ~ ${endDateStr}</div>` +
                                     `<div style="font-size: 14px; font-weight: normal; color: #555; margin-bottom:8px;">(<span style="color:#2c3e50; font-weight:bold;">${totalYears.toFixed(2)}년</span> / ${totalDays}일)</div>` +
                                     `<div class="eval-capital">${finalCapital.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div>` +
                                     `<div style="font-size: 14px; font-weight: normal; color: #7f8c8d; margin-top:5px;">초기 자본: ${initialCap.toLocaleString()} <span style="margin: 0 5px;">|</span> CAGR: <span style="color:#e74c3c; font-weight:bold;">${cagr.toFixed(2)}%</span></div>`;
                simPanel.style.display = 'block';

                evalPanel.innerHTML = `오늘의 현황 (${latestDate})<br>` +
                                      `<div style="margin: 10px 0; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap: 8px;">` +
                                      `<span>주가: <span class="eval-highlight">${latestPrice.toFixed(2)}</span></span>` + 
                                      `<span style="color:#bdc3c7;">|</span>` +
                                      `<span>이격 비율: <span class="eval-highlight">${latestDisparity.toFixed(2)}x</span></span>` + 
                                      `<span style="color:#bdc3c7;">|</span>` +
                                      `<span>위험도: <span class="eval-highlight">${riskLevel.toFixed(1)}%</span></span>` +
                                      `</div>` +
                                      `예상 물림일수(회귀기반): 약 ${expectedMulrim}일 <span style="font-size:12px; color:#7f8c8d;">(R²: ${rSquared.toFixed(3)})</span>`;
                evalPanel.style.display = 'block';
            } else {
                simPanel.style.display = 'none';
                evalPanel.innerHTML = `산정 불가: 기준 일수(${period}일)가 데이터 제공 기간보다 깁니다.`;
                evalPanel.style.display = 'block';
            }

            renderPriceChart(cachedData.dates, cachedData.prices, smaData, priceAvgDisparityLineData, priceBuyLineData, priceSellLineData, avgDisparity, period);
            renderDisparityChart(cachedData.dates, disparityData, disparityBaseLineData, disparityAvgLineData, disparityBuyLineData, disparitySellLineData, avgDisparity, maxDisp, minDisp, period);
            populateTable(cachedData.dates, cachedData.prices, displayMulrimData, smaData, disparityData, tradeActions, capitalHistory, period);
        }

                        if (!labels) return null;
                        
                        // 줌 플러그인용 안전장치 (가상의 소수점 틱은 무시)
                        if (Math.floor(val) !== val) return null; 
                        
                        const label = labels[val];
                        if (!label || label.length < 4) return null;

                        if (val === 0) return label.substring(0, 4) + '-01';
                        
                        const prevLabel = labels[val - 1];
                        if (!prevLabel || prevLabel.length < 4) return null;
                        
                        if (label.substring(0, 4) !== prevLabel.substring(0, 4)) {
                            return label.substring(0, 4) + '-01';
                        }
                        return null;
                    } catch(e) {
                        return null; 
                    }
                }
            };
        }

            URL.revokeObjectURL(url);

        function getFastR2ForPeriod(period) {
            const N = cachedData.prices.length;
            let validX = [], validY = [], sum = 0;
            for (let i = 0; i < N; i++) {
                sum += cachedData.prices[i];
                if (i >= period) sum -= cachedData.prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let disparity = cachedData.prices[i] / avg;
                        if ((N - 1) - i >= cachedData.maxMulrim && Number.isFinite(disparity)) {
                            validX.push(disparity); validY.push(cachedData.rawMulrimData[i]);
                        }
                    }
                }
            }
            if (validX.length < 30) return 0; 
            let sumX = 0, sumY = 0;
            for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
            let meanX = sumX / validX.length, meanY = sumY / validY.length;
            let covXY = 0, varX = 0, varY = 0;
            for (let i = 0; i < validX.length; i++) {
                let dx = validX[i] - meanX, dy = validY[i] - meanY;
                covXY += dx * dy; varX += dx * dx; varY += dy * dy;
            }
            if (varX > 0 && varY > 0) return (covXY / Math.sqrt(varX * varY)) ** 2;
            return 0;
        }

        function runOptimization() {
            const maxTestPeriod = Math.min(3000, cachedData.prices.length - cachedData.maxMulrim - 30);
            if (maxTestPeriod < 1) { closeModal('optimizer-modal'); return alert("데이터가 부족합니다."); }
            let labels = [], r2Data = [], maxR2 = -1, bestPeriod = 1; 
            for (let p = 1; p <= maxTestPeriod; p += 1) {
                let r2 = getFastR2ForPeriod(p);
                labels.push(p); r2Data.push(r2);
                if (r2 > maxR2) { maxR2 = r2; bestPeriod = p; }
            }
            bestOptimizedPeriod = bestPeriod;
            
            const ctx = document.getElementById('optimizerChart').getContext('2d');
            let pointColors = labels.map(l => l === bestPeriod ? '#e74c3c' : '#3498db');
            let pointRadius = labels.map(l => l === bestPeriod ? 6 : 0);
            optChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'R²', data: r2Data, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.1)', borderWidth: 2, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointRadius: pointRadius, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomPluginX } }
            });

            document.getElementById('opt-apply-btn').style.display = 'inline-block';
        }

        function runTradeOptimization() {
            const period = parseInt(document.getElementById('ma-period').value) || 1500;
            const initCap = parseFloat(document.getElementById('initial-cap').value) || 10000;
            const N = cachedData.prices.length;
            let disparities = new Array(N).fill(null);
            let sum = 0, validCount = 0;
            let minD = 9999, maxD = -9999;

            for (let i = 0; i < N; i++) {
                let p = cachedData.prices[i];
                sum += p;
                if (i >= period) sum -= cachedData.prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let d = p / avg;
                        disparities[i] = d;
                        if (Number.isFinite(d)) {
                            validCount++;
                            if (d < minD) minD = d;
                            if (d > maxD) maxD = d;
                        }
                    }
                }
            }

            if (validCount < 10) {
                closeModal('trade-optimizer-modal');
                return alert("데이터가 너무 적어 최적화할 수 없습니다.");
            }

            let step = 0.05; 
            let startD = Math.floor(minD * 100) / 100;
            let endD = Math.ceil(maxD * 100) / 100;

            let xLabels = []; 
            let yLabels = []; 
            
            for (let b = startD; b <= endD - step; b += step) xLabels.push(parseFloat(b.toFixed(2)));
            for (let s = startD + step; s <= endD; s += step) yLabels.push(parseFloat(s.toFixed(2)));

            let results = [];
            let maxFinalCapital = -1;
            let minFinalCapital = Infinity;
            let bestBuy = 0, bestSell = 0;

            for (let i = 0; i < yLabels.length; i++) {
                let sellPt = yLabels[i];
                for (let j = 0; j < xLabels.length; j++) {
                    let buyPt = xLabels[j];
                    if (buyPt >= sellPt) continue;

                    let firstValidIdx = disparities.findIndex(d => d !== null);
                    if (firstValidIdx === -1) firstValidIdx = 0;

                    let cash = 0;
                    let shares = initCap / cachedData.prices[firstValidIdx];
                    let isHolding = true;
                    
                    for (let k = firstValidIdx; k < N; k++) {
                        let d = disparities[k];
                        if (d === null) continue;
                        
                        let p = cachedData.prices[k];
                        if (isHolding && d > sellPt && shares > 0) {
                            cash = shares * p;
                            shares = 0;
                            isHolding = false;
                        } else if (!isHolding && d < buyPt && cash > 0) {
                            shares = cash / p;
                            cash = 0;
                            isHolding = true;
                        }
                    }
                    
                    let finalCap = cash + (shares * cachedData.prices[N - 1]);
                    results.push({ buy: buyPt, sell: sellPt, v: finalCap });

                    if (finalCap > maxFinalCapital) {
                        maxFinalCapital = finalCap;
                        bestBuy = buyPt;
                        bestSell = sellPt;
                    }
                    if (finalCap < minFinalCapital) {
                        minFinalCapital = finalCap;
                    }
                }
            }

            bestOptimizedBuy = bestBuy;
            bestOptimizedSell = bestSell;

            let scatterData = [];
            let scatterColors = [];
            
            for (let item of results) {
                scatterData.push({ x: item.sell, y: item.buy });
                let t = (maxFinalCapital === minFinalCapital) ? 0 : (maxFinalCapital - item.v) / (maxFinalCapital - minFinalCapital);
                let v = t * 4; 
                let r, g, b;
                if (v <= 1) { r = 255; g = Math.round(v * 255); b = 0; } 
                else if (v <= 2) { r = Math.round(255 - (v - 1) * 255); g = 255; b = 0; } 
                else if (v <= 3) { r = 0; g = 255; b = Math.round((v - 2) * 255); } 
                else { r = 0; g = Math.round(255 - (v - 3) * 255); b = 255; }
                
                scatterColors.push(`rgba(${r}, ${g}, ${b}, 0.8)`);
            }

            const ctx = document.getElementById('tradeOptimizerChart').getContext('2d');
            if (tradeOptChartInstance) tradeOptChartInstance.destroy();
            
            tradeOptChartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '최종 자본금 (적색:최고수익 → 청색:최저수익)',
                        data: scatterData,
                        backgroundColor: scatterColors,
                        pointStyle: 'rect',
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'nearest', intersect: true, axis: 'xy' },
                    onClick: function(e, elements) {
                        if (elements.length > 0) {
                            const idx = elements[0].index;
                            const item = results[idx];
                            window.selectedPointFromChart = { buy: item.buy, sell: item.sell };
                            document.getElementById('custom-apply-btn').disabled = false;
                            
                            document.getElementById('trade-opt-result-text').innerHTML = 
                                `최고 효율 매수: <span style="color:#27ae60;">${bestBuy}x</span> 이하 / 매도: <span style="color:#e74c3c;">${bestSell}x</span> 이상<br>`+
                                `이때의 예상 최고 자본: <span style="color:#d35400;">${maxFinalCapital.toLocaleString(undefined, {maximumFractionDigits:2})}</span><br><br>`+
                                `<span style="color:#2980b9; font-size:15px; font-weight:bold;">[선택된 타점] 매수: ${item.buy}x / 매도: ${item.sell}x (최종자본: ${item.v.toLocaleString(undefined, {maximumFractionDigits:2})})</span>`;
                        }
                    },
                    plugins: {
                        zoom: zoomPluginXY,
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let idx = context.dataIndex;
                                    let cap = results[idx].v;
                                    return `매도: ${context.parsed.x.toFixed(2)}x, 매수: ${context.parsed.y.toFixed(2)}x | 자산: ${cap.toLocaleString(undefined, {maximumFractionDigits:0})}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: '매도 기준선 (Sell)' } },
                        y: { title: { display: true, text: '매수 기준선 (Buy)' } }
                    }
                }
            });

            document.getElementById('trade-opt-result-text').innerHTML = 
                `최고 효율 매수: <span style="color:#27ae60;">${bestBuy}x</span> 이하 / 매도: <span style="color:#e74c3c;">${bestSell}x</span> 이상<br>`+
                `이때의 예상 최종 자산: <span style="color:#e74c3c;">${maxFinalCapital.toLocaleString(undefined, {maximumFractionDigits:2})}</span>`;
            document.getElementById('trade-opt-apply-btn').style.display = 'inline-block';
        }

        function applyTradeOptimization() {
            document.getElementById('buy-point').value = bestOptimizedBuy;
            document.getElementById('sell-point').value = bestOptimizedSell;
            closeModal('trade-optimizer-modal');
            calculateAndRender();
        }

        function applySelectedPoint() {
            if (window.selectedPointFromChart) {
                document.getElementById('buy-point').value = window.selectedPointFromChart.buy;
                document.getElementById('sell-point').value = window.selectedPointFromChart.sell;
                closeModal('trade-optimizer-modal');
                calculateAndRender();
            }
        }

        window.onload = handleRenderClick;
    </script>
</body>
</html>
