<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 커스텀 분석 차트 및 평가 (R² 포함)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }
        .control-panel label {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        .control-panel input {
            width: 70px;
            padding: 6px;
            margin-left: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        #ticker-input {
            width: 90px;
            text-transform: uppercase;
            font-weight: bold;
            color: #e74c3c;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .evaluation-panel {
            display: none; 
            background-color: #e8f4f8;
            border: 1px solid #bce8f1;
            color: #31708f;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            line-height: 1.6;
        }
        .eval-highlight {
            color: #e74c3c;
            font-size: 20px;
            margin: 0 5px;
        }
        .eval-sub {
            font-size: 14px;
            color: #555;
            font-weight: normal;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        .main-chart {
            height: 50vh;
            min-height: 400px;
        }
        .sub-chart {
            height: 30vh;
            min-height: 250px;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
        }
        .btn-container {
            text-align: center;
        }
        #table-container {
            display: none;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }
        th {
            background-color: #f1f1f1;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div class="widget-container">
        <div class="header">
            <h1 id="main-title">TQQQ Custom Analytics</h1>
            <p>원하는 티커와 기준 일수, 볼린저밴드 표준편차를 자유롭게 설정해 보세요.</p>
        </div>

        <div class="control-panel">
            <label>티커 <input type="text" id="ticker-input" value="TQQQ"></label>
            <label>기준 일수 <input type="number" id="ma-period" value="1500" min="1"></label>
            <label>상한선 (+) <input type="number" id="upper-mult" step="0.1" value="3.0"></label>
            <label>하한선 (-) <input type="number" id="lower-mult" step="0.1" value="0.5"></label>
            <button class="btn" onclick="handleRenderClick()">차트 불러오기 및 재계산</button>
        </div>

        <div id="evaluation-panel" class="evaluation-panel">
            </div>
        
        <div class="chart-wrapper main-chart">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-wrapper sub-chart">
            <canvas id="disparityChart"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn" style="padding: 10px 20px; font-size: 16px;" onclick="toggleTable()">일봉 Raw 데이터 표 보기/숨기기</button>
        </div>

        <div id="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>수정종가 (USD)</th>
                        <th>물림일수 (일)</th>
                        <th id="th-sma">N일 이평선</th>
                        <th id="th-upper-bb">BB 상한</th>
                        <th id="th-lower-bb">BB 하한</th>
                        <th id="th-disparity">N일 이격도 (배수)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let cachedTicker = '';
        let cachedData = null;

        async function handleRenderClick() {
            const inputTicker = document.getElementById('ticker-input').value.trim().toUpperCase();
            
            if (!inputTicker) {
                alert('티커명을 입력해주세요.');
                return;
            }

            if (inputTicker !== cachedTicker) {
                await fetchNewData(inputTicker);
            } else {
                calculateAndRender();
            }
        }

        async function fetchNewData(ticker) {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = `${ticker} 데이터를 불러오는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(야후 서버 응답 대기 중)</span>`;
            loadingEl.style.color = '#3498db';

            const currentUnixTime = Math.floor(Date.now() / 1000); 
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d`;

            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
            ];

            try {
                let dataFetched = null;
                for (let proxy of proxyList) {
                    try {
                        const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.chart && data.chart.result) {
                                dataFetched = data;
                                break; 
                            }
                        }
                    } catch (error) {
                        console.warn(`Proxy fail:`, error);
                    }
                }

                if (!dataFetched) throw new Error('모든 프록시에서 데이터 로드 실패');

                const result = dataFetched.chart.result[0];
                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = [];
                let prices = [];

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) continue;

                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);
                }

                cachedData = { dates: dates, prices: prices };
                cachedTicker = ticker;

                document.getElementById('main-title').innerText = `${ticker} Custom Analytics`;

                loadingEl.style.display = 'none';
                calculateAndRender(); 

            } catch (error) {
                console.error(error);
                loadingEl.innerHTML = `[${ticker}] 데이터를 찾을 수 없거나 통신에 실패했습니다.<br><span style="font-size:14px;">상장폐지 여부나 티커명을 다시 확인해 주세요.</span>`;
                loadingEl.style.color = '#e74c3c';
                
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                }, 3000);
            }
        }

        function calculateAndRender() {
            if (!cachedData) return;

            const period = parseInt(document.getElementById('ma-period').value) || 1500;
            const upperMult = parseFloat(document.getElementById('upper-mult').value) || 3.0;
            const lowerMult = parseFloat(document.getElementById('lower-mult').value) || 0.5;

            document.getElementById('th-sma').innerText = `${period}일 이평선`;
            document.getElementById('th-upper-bb').innerText = `BB 상한 (${upperMult}σ)`;
            document.getElementById('th-lower-bb').innerText = `BB 하한 (${lowerMult}σ)`;
            document.getElementById('th-disparity').innerText = `${period}일 이격도 (배수)`;

            let smaData = [];
            let upperBBData = [];
            let lowerBBData = [];
            let disparityData = [];
            let validDisparities = [];
            let windowPrices = [];

            const N = cachedData.prices.length;

            // 1. 이평선, 볼린저밴드, 이격도 계산
            for (let i = 0; i < N; i++) {
                const currentPrice = cachedData.prices[i];
                windowPrices.push(currentPrice);

                if (windowPrices.length > period) {
                    windowPrices.shift();
                }

                if (windowPrices.length === period) {
                    const sum = windowPrices.reduce((a, b) => a + b, 0);
                    const average = sum / period;
                    
                    let sqSum = 0;
                    for (let j = 0; j < period; j++) {
                        sqSum += Math.pow(windowPrices[j] - average, 2);
                    }
                    const stdDev = Math.sqrt(sqSum / period);

                    if (average > 0) {
                        const disparity = currentPrice / average; 
                        
                        smaData.push(average);
                        upperBBData.push(average + (upperMult * stdDev));
                        lowerBBData.push(Math.max(average - (lowerMult * stdDev), 0.0001));
                        
                        if (Number.isFinite(disparity)) {
                            disparityData.push(disparity);
                            validDisparities.push(disparity);
                        } else {
                            disparityData.push(null);
                        }
                    } else {
                        smaData.push(null);
                        upperBBData.push(null);
                        lowerBBData.push(null);
                        disparityData.push(null);
                    }
                } else {
                    smaData.push(null);
                    upperBBData.push(null);
                    lowerBBData.push(null);
                    disparityData.push(null);
                }
            }

            // 2. 물림일수(COUNTIF 방식) 계산 및 최댓값 도출
            let rawMulrimData = new Array(N).fill(0);
            let maxMulrim = 0;
            for (let i = 0; i < N; i++) {
                let count = 0;
                let currentPrice = cachedData.prices[i];
                for (let j = i + 1; j < N; j++) {
                    if (cachedData.prices[j] < currentPrice) {
                        count++;
                    }
                }
                rawMulrimData[i] = count;
                if (count > maxMulrim) {
                    maxMulrim = count;
                }
            }

            // 3. 물림일수 표기 필터링 (최신 날짜와의 차이가 maxMulrim보다 작으면 '데이터 부족' 처리)
            let displayMulrimData = new Array(N);
            for (let i = 0; i < N; i++) {
                let futureDaysAvailable = (N - 1) - i;
                if (futureDaysAvailable < maxMulrim) {
                    displayMulrimData[i] = "데이터 부족";
                } else {
                    displayMulrimData[i] = rawMulrimData[i];
                }
            }

            // 4. 이격도와 물림일수 간의 R² (결정계수) 계산
            let rSquared = 0;
            let validX = [];
            let validY = [];
            for (let i = 0; i < N; i++) {
                // 이격도 값이 존재하고 && 물림일수가 '데이터 부족'이 아닌 날짜만 추출
                if (disparityData[i] !== null && displayMulrimData[i] !== "데이터 부족") {
                    validX.push(disparityData[i]);
                    validY.push(rawMulrimData[i]);
                }
            }

            if (validX.length > 1) {
                let sumX = 0, sumY = 0;
                for (let i = 0; i < validX.length; i++) {
                    sumX += validX[i];
                    sumY += validY[i];
                }
                let meanX = sumX / validX.length;
                let meanY = sumY / validY.length;

                let covXY = 0, varX = 0, varY = 0;
                for (let i = 0; i < validX.length; i++) {
                    let dx = validX[i] - meanX;
                    let dy = validY[i] - meanY;
                    covXY += dx * dy;
                    varX += dx * dx;
                    varY += dy * dy;
                }

                if (varX > 0 && varY > 0) {
                    let r = covXY / Math.sqrt(varX * varY);
                    rSquared = r * r;
                }
            }

            // 이격도 Y축 스케일러
            let maxDisp = 5, minDisp = 0;
            if (validDisparities.length > 0) {
                maxDisp = Math.max(...validDisparities);
                minDisp = Math.min(...validDisparities);
            }

            // 오늘의 평가 및 R² 패널 업데이트
            const evalPanel = document.getElementById('evaluation-panel');
            if (validDisparities.length > 0) {
                const latestDate = cachedData.dates[cachedData.dates.length - 1];
                const latestDisparity = validDisparities[validDisparities.length - 1];
                
                let riskLevel = 0;
                if (maxDisp > minDisp) {
                    riskLevel = ((latestDisparity - minDisp) / (maxDisp - minDisp)) * 100;
                }

                evalPanel.innerHTML = `오늘의 평가 (${latestDate})<br>` +
                                      `이격 비율 : <span class="eval-highlight">${latestDisparity.toFixed(2)}x</span> / ` +
                                      `위험도 : <span class="eval-highlight">${riskLevel.toFixed(1)}%</span> <span class="eval-sub">(0%에 가까울 수록 매수 권장)</span><br>` +
                                      `<span style="font-size:16px; color:#555; display:inline-block; margin-top:8px;">기준일수 : ${period} / R² = ${rSquared.toFixed(4)}</span>`;
                evalPanel.style.display = 'block';
            } else {
                evalPanel.innerHTML = `오늘의 평가 : 기준 일수(${period}일)가 전체 상장 기간보다 길어 산정할 수 없습니다.`;
                evalPanel.style.display = 'block';
            }

            // 차트 및 표 렌더링
            renderPriceChart(cachedData.dates, cachedData.prices, smaData, upperBBData, lowerBBData, period, upperMult, lowerMult);
            renderDisparityChart(cachedData.dates, disparityData, maxDisp, minDisp, period);
            populateTable(cachedData.dates, cachedData.prices, displayMulrimData, smaData, upperBBData, lowerBBData, disparityData, period);
        }

        // 1. 메인 차트
        function renderPriceChart(labels, priceData, smaData, upperBBData, lowerBBData, period, upperMult, lowerMult) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (window.priceChartInstance) {
                window.priceChartInstance.destroy();
            }
            
            window.priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: `${cachedTicker} 수정종가`,
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 1
                        },
                        {
                            label: `${period}일 이동평균선`,
                            data: smaData,
                            borderColor: '#f1c40f',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1,
                            spanGaps: true,
                            order: 2
                        },
                        {
                            label: `BB 상한 (${upperMult}σ)`,
                            data: upperBBData,
                            borderColor: '#95a5a6',
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            tension: 0.1,
                            spanGaps: true,
                            order: 3
                        },
                        {
                            label: `BB 하한 (${lowerMult}σ)`,
                            data: lowerBBData,
                            borderColor: '#95a5a6',
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            tension: 0.1,
                            spanGaps: true,
                            order: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += context.parsed.y.toFixed(2);
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'logarithmic',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '가격 (USD, 로그스케일)', color: '#333' }
                        }
                    }
                }
            });
        }

        // 2. 서브 차트 (이격도)
        function renderDisparityChart(labels, disparityData, maxDisp, minDisp, period) {
            const ctx = document.getElementById('disparityChart').getContext('2d');
            
            if (window.disparityChartInstance) {
                window.disparityChartInstance.destroy();
            }
            
            window.disparityChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: `${period}일 이격 비율 (배수)`,
                            data: disparityData,
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2, 
                            pointRadius: 0,
                            tension: 0.1,
                            spanGaps: true,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += context.parsed.y.toFixed(2) + 'x';
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격 비율 (현재가/이평선)', color: '#e74c3c' },
                            min: minDisp, 
                            max: maxDisp 
                        }
                    }
                }
            });
        }

        // 3. 데이터 표 렌더링
        function populateTable(dates, prices, displayMulrimData, smaData, upperBBData, lowerBBData, disparityData, period) {
            const tableBody = document.getElementById('table-body');
            let htmlContent = '';

            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const price = prices[i] ? prices[i].toFixed(4) : 'N/A';
                
                const mulrim = displayMulrimData[i] === "데이터 부족" ? `<span style="color:#e74c3c;">데이터 부족</span>` : displayMulrimData[i];
                const sma = smaData[i] !== null ? smaData[i].toFixed(4) : '-';
                const upperBB = upperBBData[i] !== null ? upperBBData[i].toFixed(4) : '-';
                const lowerBB = lowerBBData[i] !== null ? lowerBBData[i].toFixed(4) : '-';
                const disparity = disparityData[i] !== null ? disparityData[i].toFixed(4) : `<span style="color:#999;">데이터 부족(${period}일 미만)</span>`;

                htmlContent += `
                    <tr>
                        <td>${date}</td>
                        <td>${price}</td>
                        <td>${mulrim}</td>
                        <td>${sma}</td>
                        <td>${upperBB}</td>
                        <td>${lowerBB}</td>
                        <td>${disparity}</td>
                    </tr>
                `;
            }
            tableBody.innerHTML = htmlContent;
        }

        function toggleTable() {
            const container = document.getElementById('table-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        // 페이지 최초 로드 시 기본값으로 실행
        handleRenderClick();
    </script>
</body>
</html>
