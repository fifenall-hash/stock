<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주식 커스텀 분석 차트 (심층 분석 기능 추가)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stock Analytics">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 15px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 22px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 13px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }
        .control-panel label {
            font-size: 13px;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        .control-panel input, .control-panel select {
            padding: 6px;
            margin-left: 5px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            color: #2c3e50;
        }
        .control-panel input[type="number"] {
            width: 60px;
        }
        #ticker-input {
            width: 80px;
            text-transform: uppercase;
            font-weight: bold;
            color: #e74c3c;
        }
        .btn-group {
            width: 100%;
            text-align: center;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            flex: 1 1 auto;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .btn-optimize { background-color: #8e44ad; }
        .btn-optimize:hover { background-color: #732d91; }
        .btn-info { background-color: #2980b9; }
        .btn-info:hover { background-color: #2471a3; }
        .btn-download { background-color: #27ae60; margin-top: 10px; }
        .btn-download:hover { background-color: #219653; }
        
        .evaluation-panel {
            display: none; 
            background-color: #e8f4f8;
            border: 1px solid #bce8f1;
            color: #31708f;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            line-height: 1.8;
            word-break: keep-all;
        }
        .eval-highlight {
            color: #e74c3c;
            font-size: 20px;
            margin: 0 3px;
        }
        .eval-sub {
            font-size: 12px;
            color: #555;
            font-weight: normal;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        .main-chart { height: 45vh; min-height: 350px; }
        .sub-chart { height: 30vh; min-height: 250px; }
        
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            width: 80%;
            max-width: 300px;
        }
        .btn-container { text-align: center; }
        #table-container { display: none; }

        /* 모달창 CSS 공통 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .opt-chart-container {
            position: relative;
            height: 350px;
            width: 100%;
            margin-bottom: 15px;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div id="optimizer-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0;">📈 이격도 최적화 분석기 (정밀)</h2>
            <div class="opt-chart-container">
                <canvas id="optimizerChart"></canvas>
            </div>
            <p id="opt-result-text" style="font-size:16px; font-weight:bold; margin:15px 0;">수백만 번의 시뮬레이션을 진행하고 있습니다...</p>
            <div class="modal-actions">
                <button id="opt-apply-btn" class="btn btn-download" style="display:none; margin:0;" onclick="applyOptimization()">적용하기</button>
                <button class="btn" style="margin:0;" onclick="closeModal('optimizer-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="timeseries-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0; color:#2c3e50;">📅 날짜별 이격도 & 물림일수 추이</h2>
            <div class="opt-chart-container">
                <canvas id="timeseriesChart"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn" style="margin:0;" onclick="closeModal('timeseries-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="scatter-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 18px; margin-top: 0; color:#2c3e50;">📈 상관관계 산점도 및 추세선</h2>
            <div class="opt-chart-container">
                <canvas id="scatterChart"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn" style="margin:0;" onclick="closeModal('scatter-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div class="widget-container">
        <div class="header">
            <h1 id="main-title">Custom Analytics</h1>
            <p>미국 주식은 티커명, 한국 주식은 6자리 숫자 코드를 입력해 보세요.</p>
        </div>

        <div class="control-panel">
            <label>시장
                <select id="market-select">
                    <option value="">미국</option>
                    <option value=".KS">한국(코스피)</option>
                    <option value=".KQ">한국(코스닥)</option>
                </select>
            </label>
            <label>종목 <input type="text" id="ticker-input" value="TQQQ"></label>
            <label>기준일수 <input type="number" id="ma-period" value="1500" min="1"></label>
            <label>상한선(+) <input type="number" id="upper-mult" step="0.1" value="3.0"></label>
            <label>하한선(-) <input type="number" id="lower-mult" step="0.1" value="0.5"></label>
            
            <div class="btn-group">
                <button class="btn" onclick="handleRenderClick()">데이터 갱신 및 재계산</button>
                <button class="btn btn-optimize" onclick="openOptimizer()">💡 이격도 최적화 계산기</button>
            </div>
            <div class="btn-group" style="margin-top: 5px;">
                <button class="btn btn-info" onclick="openTimeseriesModal()">📅 이격도 vs 물림일수 차트</button>
                <button class="btn btn-info" onclick="openScatterModal()">📈 산점도 (이격도-물림일수)</button>
            </div>
        </div>

        <div id="evaluation-panel" class="evaluation-panel"></div>
        
        <div class="chart-wrapper main-chart">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-wrapper sub-chart">
            <canvas id="disparityChart"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn btn-download" onclick="downloadCSV()">⬇️ 일봉 데이터 표 다운로드 (.csv)</button>
        </div>

        <div id="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>수정종가</th>
                        <th>물림일수(일)</th>
                        <th>N일 이평선</th>
                        <th>BB 상한</th>
                        <th>BB 하한</th>
                        <th>N일 이격도</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }

        let cachedTicker = '';
        let cachedCompanyName = 'TQQQ';
        let cachedData = null;
        
        // 차트 인스턴스 전역 변수 관리
        let optChartInstance = null;
        let timeseriesChartInstance = null;
        let scatterChartInstance = null;
        let bestOptimizedPeriod = 1500;

        // 메인 분석 결과를 저장하여 모달에서 공유하기 위한 전역 객체
        window.currentAnalysis = null;

        async function handleRenderClick() {
            let rawTicker = document.getElementById('ticker-input').value.trim().toUpperCase();
            const marketSuffix = document.getElementById('market-select').value;
            
            if (!rawTicker) return alert('티커명 혹은 6자리 종목코드를 입력해주세요.');

            let inputTicker = rawTicker;
            if (marketSuffix !== "" && !rawTicker.includes(".")) {
                inputTicker = rawTicker + marketSuffix;
            }

            if (inputTicker !== cachedTicker) {
                await fetchNewData(inputTicker);
            } else {
                calculateAndRender();
            }
        }

        async function fetchNewData(ticker) {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = `${ticker} 데이터를 불러오는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(야후 서버 응답 대기 중)</span>`;
            loadingEl.style.color = '#3498db';

            const currentUnixTime = Math.floor(Date.now() / 1000); 
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d`;

            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
            ];

            try {
                let dataFetched = null;
                for (let proxy of proxyList) {
                    try {
                        const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.chart && data.chart.result) { dataFetched = data; break; }
                        }
                    } catch (error) { console.warn(`Proxy fail:`, error); }
                }

                if (!dataFetched) throw new Error('모든 프록시에서 데이터 로드 실패');

                const result = dataFetched.chart.result[0];
                const meta = result.meta;
                const companyName = meta.shortName || meta.longName || ticker;
                cachedCompanyName = companyName;

                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = []; let prices = [];
                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) continue;
                    const dateObj = new Date(timestamps[i] * 1000);
                    dates.push(dateObj.toISOString().split('T')[0]);
                    prices.push(currentPrice);
                }

                const N = prices.length;
                let rawMulrimData = new Array(N).fill(0);
                let maxMulrim = 0;
                for (let i = 0; i < N; i++) {
                    let count = 0;
                    let currentPrice = prices[i];
                    for (let j = i + 1; j < N; j++) { if (prices[j] < currentPrice) count++; }
                    rawMulrimData[i] = count;
                    if (count > maxMulrim) maxMulrim = count;
                }

                cachedData = { dates: dates, prices: prices, rawMulrimData: rawMulrimData, maxMulrim: maxMulrim };
                cachedTicker = ticker;
                document.getElementById('main-title').innerText = `${companyName} Analytics`;
                loadingEl.style.display = 'none';
                calculateAndRender(); 

            } catch (error) {
                console.error(error);
                loadingEl.innerHTML = `데이터 통신에 실패했습니다.<br><span style="font-size:13px;">상장폐지 여부나 종목코드를 다시 확인해 주세요.</span>`;
                loadingEl.style.color = '#e74c3c';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 3000);
            }
        }

        function calculateAndRender() {
            if (!cachedData) return;

            const period = parseInt(document.getElementById('ma-period').value) || 1500;
            const upperMult = parseFloat(document.getElementById('upper-mult').value) || 3.0;
            const lowerMult = parseFloat(document.getElementById('lower-mult').value) || 0.5;

            let smaData = [], upperBBData = [], lowerBBData = [], disparityData = [], validDisparities = [], windowPrices = [];
            const N = cachedData.prices.length;
            const maxMulrim = cachedData.maxMulrim;
            const rawMulrimData = cachedData.rawMulrimData;

            for (let i = 0; i < N; i++) {
                const currentPrice = cachedData.prices[i];
                windowPrices.push(currentPrice);
                if (windowPrices.length > period) windowPrices.shift();

                if (windowPrices.length === period) {
                    const average = windowPrices.reduce((a, b) => a + b, 0) / period;
                    let sqSum = 0;
                    for (let j = 0; j < period; j++) sqSum += Math.pow(windowPrices[j] - average, 2);
                    const stdDev = Math.sqrt(sqSum / period);

                    if (average > 0) {
                        const disparity = currentPrice / average; 
                        smaData.push(average);
                        upperBBData.push(average + (upperMult * stdDev));
                        lowerBBData.push(Math.max(average - (lowerMult * stdDev), 0.0001));
                        
                        if (Number.isFinite(disparity)) { disparityData.push(disparity); validDisparities.push(disparity); } 
                        else disparityData.push(null);
                    } else { smaData.push(null); upperBBData.push(null); lowerBBData.push(null); disparityData.push(null); }
                } else { smaData.push(null); upperBBData.push(null); lowerBBData.push(null); disparityData.push(null); }
            }

            let avgDisparity = validDisparities.length > 0 ? validDisparities.reduce((a, b) => a + b, 0) / validDisparities.length : 0;
            let disparityBaseLineData = [], disparityAvgLineData = [], priceAvgDisparityLineData = [], upperBBDisparityData = [], lowerBBDisparityData = [];

            for (let i = 0; i < N; i++) {
                if (disparityData[i] !== null) {
                    disparityBaseLineData.push(1.0); disparityAvgLineData.push(avgDisparity); priceAvgDisparityLineData.push(smaData[i] * avgDisparity); 
                    upperBBDisparityData.push(upperBBData[i] / smaData[i]); lowerBBDisparityData.push(lowerBBData[i] / smaData[i]);
                } else {
                    disparityBaseLineData.push(null); disparityAvgLineData.push(null); priceAvgDisparityLineData.push(null);
                    upperBBDisparityData.push(null); lowerBBDisparityData.push(null);
                }
            }

            let displayMulrimData = new Array(N);
            let safeMulrimData = new Array(N); // 모달 차트용 순수 숫자 배열
            for (let i = 0; i < N; i++) {
                if ((N - 1) - i < maxMulrim) {
                    displayMulrimData[i] = "데이터 부족";
                    safeMulrimData[i] = null;
                } else {
                    displayMulrimData[i] = rawMulrimData[i];
                    safeMulrimData[i] = rawMulrimData[i];
                }
            }

            let rSquared = 0, slope = 0, intercept = 0, validX = [], validY = [];
            for (let i = 0; i < N; i++) {
                if (disparityData[i] !== null && safeMulrimData[i] !== null) {
                    validX.push(disparityData[i]); validY.push(safeMulrimData[i]);
                }
            }

            if (validX.length > 1) {
                let sumX = 0, sumY = 0;
                for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
                let meanX = sumX / validX.length, meanY = sumY / validY.length;
                let covXY = 0, varX = 0, varY = 0;
                for (let i = 0; i < validX.length; i++) {
                    let dx = validX[i] - meanX, dy = validY[i] - meanY;
                    covXY += dx * dy; varX += dx * dx; varY += dy * dy;
                }
                if (varX > 0 && varY > 0) {
                    rSquared = (covXY / Math.sqrt(varX * varY)) ** 2;
                    slope = covXY / varX;
                    intercept = meanY - slope * meanX;
                }
            }

            let maxDisp = 5, minDisp = 0;
            if (validDisparities.length > 0) {
                let validUpper = upperBBDisparityData.filter(v => v !== null);
                let validLower = lowerBBDisparityData.filter(v => v !== null);
                maxDisp = Math.max(...validDisparities, 1.0, avgDisparity, ...validUpper);
                minDisp = Math.min(...validDisparities, 1.0, avgDisparity, ...validLower);
            }

            // 결과를 글로벌 객체에 저장하여 모달 차트가 접근할 수 있게 함
            window.currentAnalysis = {
                dates: cachedData.dates,
                disparity: disparityData,
                mulrim: safeMulrimData,
                slope: slope,
                intercept: intercept,
                minDisp: minDisp,
                maxDisp: maxDisp,
                period: period
            };

            const evalPanel = document.getElementById('evaluation-panel');
            if (validDisparities.length > 0) {
                const latestDate = cachedData.dates[cachedData.dates.length - 1];
                const latestDisparity = validDisparities[validDisparities.length - 1];
                let riskLevel = maxDisp > minDisp ? ((latestDisparity - minDisp) / (maxDisp - minDisp)) * 100 : 0;
                let expectedMulrim = Math.max(0, Math.round(slope * latestDisparity + intercept)) || 0;

                evalPanel.innerHTML = `오늘의 평가 (${latestDate})<br>` +
                                      `<div style="margin: 10px 0;">이격 비율 : <span class="eval-highlight">${latestDisparity.toFixed(2)}x</span> &nbsp;|&nbsp; ` +
                                      `위험도 : <span class="eval-highlight">${riskLevel.toFixed(1)}%</span></div>` +
                                      `추세선(회귀분석) 기반 예상 물림일수 : <span class="eval-highlight">약 ${expectedMulrim}일</span><br>` +
                                      `<span style="font-size:14px; color:#7f8c8d; display:inline-block; margin-top:10px;">기준일수: ${period}일 / R²: ${rSquared.toFixed(4)} / 평균 이격도: ${avgDisparity.toFixed(2)}x</span>`;
                evalPanel.style.display = 'block';
            } else {
                evalPanel.innerHTML = `오늘의 평가 : 기준 일수(${period}일)가 상장 기간보다 길어 산정할 수 없습니다.`;
                evalPanel.style.display = 'block';
            }

            renderPriceChart(cachedData.dates, cachedData.prices, smaData, upperBBData, lowerBBData, priceAvgDisparityLineData, avgDisparity, period, upperMult, lowerMult);
            renderDisparityChart(cachedData.dates, disparityData, disparityBaseLineData, disparityAvgLineData, upperBBDisparityData, lowerBBDisparityData, avgDisparity, maxDisp, minDisp, period, upperMult, lowerMult);
            populateTable(cachedData.dates, cachedData.prices, displayMulrimData, smaData, upperBBData, lowerBBData, disparityData, period);
        }

        // 공통 X축 설정 (연도별 세로선 및 눈금)
        function getYearlyTicksConfig() {
            return {
                autoSkip: false, maxRotation: 0,
                callback: function(val, index) {
                    const currentLabel = this.getLabelForValue(val);
                    if (index === 0) return currentLabel;
                    const prevLabel = this.getLabelForValue(val - 1);
                    if (currentLabel.substring(0, 4) !== prevLabel.substring(0, 4)) return currentLabel.substring(0, 4) + '-01'; 
                    return null;
                }
            };
        }
        function getYearlyGridConfig() {
            return {
                display: true, drawOnChartArea: true,
                color: function(context) { return context.tick.label ? 'rgba(200, 200, 200, 0.4)' : 'rgba(0,0,0,0)'; }
            };
        }

        function renderPriceChart(labels, priceData, smaData, upperBBData, lowerBBData, priceAvgLineData, avgDisparity, period, upperMult, lowerMult) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (window.priceChartInstance) window.priceChartInstance.destroy();
            window.priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: `${cachedCompanyName} 수정종가`, data: priceData, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', borderWidth: 2, pointRadius: 0, tension: 0.1, order: 1 },
                        { label: `평균 이격 위치`, data: priceAvgLineData, borderColor: '#000000', borderWidth: 2, pointRadius: 0, tension: 0.1, spanGaps: true, order: 2 },
                        { label: `${period}일 이동평균선`, data: smaData, borderColor: '#f1c40f', borderWidth: 2, pointRadius: 0, tension: 0.1, spanGaps: true, order: 3 },
                        { label: `BB 상한`, data: upperBBData, borderColor: '#95a5a6', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, tension: 0.1, spanGaps: true, order: 4 },
                        { label: `BB 하한`, data: lowerBBData, borderColor: '#95a5a6', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, tension: 0.1, spanGaps: true, order: 5 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                    scales: { 
                        x: { grid: getYearlyGridConfig(), ticks: getYearlyTicksConfig() }, 
                        y: { type: 'logarithmic', display: true, position: 'left', title: { display: true, text: '가격(로그)', color: '#333' } } 
                    } 
                }
            });
        }

        function renderDisparityChart(labels, disparityData, baseLineData, avgLineData, upperBBDisparityData, lowerBBDisparityData, avgDisparity, maxDisp, minDisp, period, upperMult, lowerMult) {
            const ctx = document.getElementById('disparityChart').getContext('2d');
            if (window.disparityChartInstance) window.disparityChartInstance.destroy();
            window.disparityChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [ 
                        { label: `${period}일 이격 비율`, data: disparityData, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', borderWidth: 2, pointRadius: 0, tension: 0.1, spanGaps: true, fill: true, order: 1 },
                        { label: `평균 이격도`, data: avgLineData, borderColor: '#000000', borderWidth: 2, pointRadius: 0, tension: 0, spanGaps: true, order: 2 },
                        { label: `이평선 기준 (1.0x)`, data: baseLineData, borderColor: '#f1c40f', borderWidth: 2, pointRadius: 0, tension: 0, spanGaps: true, order: 3 },
                        { label: `BB 상한`, data: upperBBDisparityData, borderColor: '#95a5a6', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, tension: 0.1, spanGaps: true, order: 4 },
                        { label: `BB 하한`, data: lowerBBDisparityData, borderColor: '#95a5a6', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, tension: 0.1, spanGaps: true, order: 5 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                    scales: { 
                        x: { grid: getYearlyGridConfig(), ticks: getYearlyTicksConfig() }, 
                        y: { type: 'linear', display: true, position: 'right', title: { display: true, text: '이격 비율', color: '#3498db' }, min: minDisp, max: maxDisp } 
                    } 
                }
            });
        }

        // --- 새로 추가된 모달(팝업) 차트 제어 로직 ---
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function openTimeseriesModal() {
            if (!window.currentAnalysis) return alert('먼저 데이터를 계산해주세요.');
            document.getElementById('timeseries-modal').style.display = 'flex';
            
            const ctx = document.getElementById('timeseriesChart').getContext('2d');
            if (timeseriesChartInstance) timeseriesChartInstance.destroy();

            timeseriesChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: window.currentAnalysis.dates,
                    datasets: [
                        { label: '이격 비율 (좌측)', data: window.currentAnalysis.disparity, borderColor: '#3498db', yAxisID: 'y', pointRadius: 0, tension: 0.1, spanGaps: true },
                        { label: '물림일수 (우측)', data: window.currentAnalysis.mulrim, borderColor: '#e74c3c', yAxisID: 'y1', pointRadius: 0, tension: 0.1, spanGaps: true }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { grid: getYearlyGridConfig(), ticks: getYearlyTicksConfig() },
                        y: { type: 'linear', position: 'left', title: { display: true, text: '이격 비율 (배수)', color: '#3498db' }, min: window.currentAnalysis.minDisp, max: window.currentAnalysis.maxDisp },
                        y1: { type: 'linear', position: 'right', title: { display: true, text: '물림일수 (일)', color: '#e74c3c' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        function openScatterModal() {
            if (!window.currentAnalysis) return alert('먼저 데이터를 계산해주세요.');
            document.getElementById('scatter-modal').style.display = 'flex';
            
            const ctx = document.getElementById('scatterChart').getContext('2d');
            if (scatterChartInstance) scatterChartInstance.destroy();

            let scatterData = [];
            for(let i=0; i<window.currentAnalysis.dates.length; i++) {
                if(window.currentAnalysis.disparity[i] !== null && window.currentAnalysis.mulrim[i] !== null) {
                    scatterData.push({ x: window.currentAnalysis.disparity[i], y: window.currentAnalysis.mulrim[i] });
                }
            }

            let minX = window.currentAnalysis.minDisp;
            let maxX = window.currentAnalysis.maxDisp;
            let slope = window.currentAnalysis.slope;
            let intercept = window.currentAnalysis.intercept;
            
            // 추세선 데이터 (시작점과 끝점)
            let trendlineData = [
                { x: minX, y: slope * minX + intercept },
                { x: maxX, y: slope * maxX + intercept }
            ];

            scatterChartInstance = new Chart(ctx, {
                data: {
                    datasets: [
                        { type: 'scatter', label: '과거 일별 데이터', data: scatterData, backgroundColor: 'rgba(52, 152, 219, 0.4)', pointRadius: 3, pointHoverRadius: 5 },
                        { type: 'line', label: '추세선 (Regression)', data: trendlineData, borderColor: '#e74c3c', borderWidth: 2, pointRadius: 0, fill: false }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) { return `이격도: ${context.parsed.x.toFixed(2)}x, 물림일수: ${context.parsed.y}일`; }
                            }
                        }
                    },
                    scales: {
                        x: { type: 'linear', position: 'bottom', title: { display: true, text: '이격 비율 (배수)' }, min: minX, max: maxX },
                        y: { title: { display: true, text: '물림일수 (일)' }, beginAtZero: true }
                    }
                }
            });
        }

        // --- 기타 UI 및 최적화 로직 ---
        function populateTable(dates, prices, displayMulrimData, smaData, upperBBData, lowerBBData, disparityData, period) {
            const tableBody = document.getElementById('table-body');
            let htmlContent = '';
            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const price = prices[i] ? prices[i].toFixed(4) : 'N/A';
                const mulrim = displayMulrimData[i]; 
                const sma = smaData[i] !== null ? smaData[i].toFixed(4) : '-';
                const upperBB = upperBBData[i] !== null ? upperBBData[i].toFixed(4) : '-';
                const lowerBB = lowerBBData[i] !== null ? lowerBBData[i].toFixed(4) : '-';
                const disparity = disparityData[i] !== null ? disparityData[i].toFixed(4) : '데이터 부족';
                htmlContent += `<tr><td>${date}</td><td>${price}</td><td>${mulrim}</td><td>${sma}</td><td>${upperBB}</td><td>${lowerBB}</td><td>${disparity}</td></tr>`;
            }
            tableBody.innerHTML = htmlContent;
        }

        function downloadCSV() {
            const table = document.getElementById('data-table');
            let csvContent = "\uFEFF"; 
            for (let i = 0; i < table.rows.length; i++) {
                let row = table.rows[i];
                let rowData = [];
                for (let j = 0; j < row.cells.length; j++) {
                    let cellText = row.cells[j].innerText;
                    cellText = '"' + cellText.replace(/"/g, '""') + '"';
                    rowData.push(cellText);
                }
                csvContent += rowData.join(",") + "\n";
            }
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `${cachedCompanyName}_일봉데이터_분석.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function openOptimizer() {
            if (!cachedData) return alert('먼저 데이터를 불러와주세요.');
            document.getElementById('optimizer-modal').style.display = 'flex';
            document.getElementById('opt-apply-btn').style.display = 'none';
            document.getElementById('opt-result-text').innerText = '최적의 기준 일수를 찾기 위해 수백만 번의 시뮬레이션 중입니다...';
            if (optChartInstance) optChartInstance.destroy();
            setTimeout(() => { runOptimization(); }, 100);
        }

        function getFastR2ForPeriod(period) {
            const N = cachedData.prices.length;
            let validX = [], validY = [], sum = 0;
            for (let i = 0; i < N; i++) {
                let price = cachedData.prices[i];
                sum += price;
                if (i >= period) sum -= cachedData.prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let disparity = price / avg;
                        if ((N - 1) - i >= cachedData.maxMulrim && Number.isFinite(disparity)) {
                            validX.push(disparity); validY.push(cachedData.rawMulrimData[i]);
                        }
                    }
                }
            }
            if (validX.length < 30) return 0; 
            let sumX = 0, sumY = 0;
            for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
            let meanX = sumX / validX.length, meanY = sumY / validY.length;
            let covXY = 0, varX = 0, varY = 0;
            for (let i = 0; i < validX.length; i++) {
                let dx = validX[i] - meanX, dy = validY[i] - meanY;
                covXY += dx * dy; varX += dx * dx; varY += dy * dy;
            }
            if (varX > 0 && varY > 0) return (covXY / Math.sqrt(varX * varY)) ** 2;
            return 0;
        }

        function runOptimization() {
            const maxTestPeriod = Math.min(3000, cachedData.prices.length - cachedData.maxMulrim - 30);
            if (maxTestPeriod < 1) {
                alert("상장 기간이 짧아 데이터를 충분히 확보할 수 없으므로 최적화를 수행할 수 없습니다.");
                closeModal('optimizer-modal');
                return;
            }

            let labels = [], r2Data = [], maxR2 = -1, bestPeriod = 1; 
            for (let p = 1; p <= maxTestPeriod; p += 1) {
                let r2 = getFastR2ForPeriod(p);
                labels.push(p); r2Data.push(r2);
                if (r2 > maxR2) { maxR2 = r2; bestPeriod = p; }
            }

            bestOptimizedPeriod = bestPeriod;
            renderOptChart(labels, r2Data, bestPeriod);

            document.getElementById('opt-result-text').innerHTML = `최적화 기준일수는 <span style="color:#e74c3c; font-size:24px;">${bestPeriod}일</span> 입니다.<br><span style="font-size:14px; color:#7f8c8d;">(최대 R² = ${maxR2.toFixed(4)})</span><br><br>적용하시겠습니까?`;
            document.getElementById('opt-apply-btn').style.display = 'inline-block';
        }

        function renderOptChart(labels, data, bestPeriod) {
            const ctx = document.getElementById('optimizerChart').getContext('2d');
            let pointColors = labels.map(l => l === bestPeriod ? '#e74c3c' : '#3498db');
            let pointRadius = labels.map(l => l === bestPeriod ? 6 : 0);

            optChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'R²', data: data, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', borderWidth: 2, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointRadius: pointRadius, pointHoverRadius: 6, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: '기준 일수' } }, y: { title: { display: true, text: 'R²' } } } }
            });
        }

        function applyOptimization() {
            document.getElementById('ma-period').value = bestOptimizedPeriod;
            closeModal('optimizer-modal');
            calculateAndRender();
        }

        window.onload = handleRenderClick;
    </script>
