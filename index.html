<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ 종가 및 1500일 이격도</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .chart-wrapper {
            position: relative;
            height: 60vh;
            min-height: 400px;
            width: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <h1>TQQQ Price & 1500-Day Disparity Index</h1>
            <p>야후 파이낸스 API 기반 실시간 계산 차트 (파란선: 종가 / 붉은선: 1500일 이격도)</p>
        </div>
        
        <div class="chart-wrapper">
            <div id="loading">
                데이터를 불러오고 계산하는 중입니다...<br>
                <span style="font-size: 14px; color: #7f8c8d;">(여러 프록시 서버를 확인하느라 몇 초 정도 걸릴 수 있습니다)</span>
            </div>
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        // 여러 프록시 서버를 순차적으로 시도하여 안정성을 높이는 로직
        const symbol = 'TQQQ';
        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=max&interval=1d`;

        // 작동 가능한 무료 CORS 프록시 리스트
        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        async function fetchWithFallback() {
            for (let proxy of proxyList) {
                try {
                    console.log(`데이터 요청 시도 중: ${proxy}`);
                    const response = await fetch(proxy, { 
                        method: 'GET', 
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // 야후 파이낸스 정상 응답 포맷인지 확인
                        if (data && data.chart && data.chart.result) {
                            return data;
                        }
                    }
                } catch (error) {
                    console.warn(`프록시 실패 (${proxy}):`, error);
                }
            }
            throw new Error('모든 프록시 서버에서 데이터 로드에 실패했습니다.');
        }

        async function fetchAndRenderChart() {
            try {
                const rawData = await fetchWithFallback();
                const result = rawData.chart.result[0];
                
                const timestamps = result.timestamp;
                const closePrices = result.indicators.quote[0].close;

                let dates = [];
                let prices = [];
                let disparityData = [];
                const MA_PERIOD = 1500;

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = closePrices[i];
                    
                    // null 데이터 스킵 (휴장일 에러 방지)
                    if (currentPrice === null || currentPrice === undefined) continue;

                    // 날짜 변환
                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);

                    // 1500일 이동평균 및 이격도 계산
                    if (prices.length >= MA_PERIOD) {
                        let sum = 0;
                        for (let j = 0; j < MA_PERIOD; j++) {
                            sum += prices[prices.length - 1 - j];
                        }
                        const average = sum / MA_PERIOD;
                        const disparity = (currentPrice / average) * 100;
                        disparityData.push(disparity);
                    } else {
                        disparityData.push(null);
                    }
                }

                renderChart(dates, prices, disparityData);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error('최종 Data Fetch Error:', error);
                document.getElementById('loading').innerHTML = 
                    '데이터를 불러오는 데 실패했습니다.<br>' +
                    '<span style="font-size:14px;">(야후 파이낸스 API 또는 프록시가 일시적으로 차단되었습니다. 잠시 후 새로고침 해주세요.)</span>';
                document.getElementById('loading').style.color = '#e74c3c';
            }
        }

        function renderChart(labels, priceData, disparityData) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            // 기존 차트가 있다면 파괴하고 다시 그림 (중복 렌더링 방지)
            if (window.myLineChart) {
                window.myLineChart.destroy();
            }
            
            window.myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TQQQ 종가 (USD)',
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1
                        },
                        {
                            label: '1500일 이격도 (%)',
                            data: disparityData,
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y1',
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += context.parsed.y.toFixed(2);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '주가 (USD)', color: '#3498db' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격도 (%)', color: '#e74c3c' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        // 스크립트 실행
        fetchAndRenderChart();
    </script>
</body>
</html>
