<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ 수정종가(로그) 및 1500일 이격도</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .chart-wrapper {
            position: relative;
            height: 60vh;
            min-height: 400px;
            width: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            z-index: 10;
            background: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <h1>TQQQ Price & 1500-Day Disparity Index</h1>
            <p>액면분할 반영 수정종가 (파란선: 주가 / 붉은선: 1500일 이격도)</p>
        </div>
        
        <div class="chart-wrapper">
            <div id="loading">데이터를 분석하고 계산하는 중입니다...<br><span style="font-size:14px; color:#7f8c8d;">(최대 5초 정도 소요될 수 있습니다)</span></div>
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        const symbol = 'TQQQ';
        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=max&interval=1d`;

        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        async function fetchWithFallback() {
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.chart && data.chart.result) return data;
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, error);
                }
            }
            throw new Error('데이터 로드 실패');
        }

        async function fetchAndRenderChart() {
            try {
                const rawData = await fetchWithFallback();
                const result = rawData.chart.result[0];
                
                const timestamps = result.timestamp;
                const priceDataArray = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : result.indicators.quote[0].close;

                let dates = [];
                let prices = [];
                let disparityData = [];
                
                const MA_PERIOD = 1500;
                let windowPrices = []; // 결측치 에러를 방지하기 위한 슬라이딩 윈도우 배열

                for (let i = 0; i < timestamps.length; i++) {
                    const currentPrice = priceDataArray[i];
                    
                    // 에러 데이터(null, undefined, 0 이하, 비정상 숫자)를 철저히 걸러냅니다.
                    if (!currentPrice || currentPrice <= 0 || !Number.isFinite(currentPrice)) {
                        continue;
                    }

                    const dateObj = new Date(timestamps[i] * 1000);
                    const dateStr = dateObj.toISOString().split('T')[0];
                    
                    dates.push(dateStr);
                    prices.push(currentPrice);
                    windowPrices.push(currentPrice);

                    // 1500일 유지 로직
                    if (windowPrices.length > MA_PERIOD) {
                        windowPrices.shift(); // 가장 오래된 과거 데이터 1개 제거
                    }

                    // 정확히 1500일의 데이터가 모였을 때만 이격도 계산
                    if (windowPrices.length === MA_PERIOD) {
                        // 배열 안의 1500개 데이터를 모두 더해 안전하게 평균 도출
                        const sum = windowPrices.reduce((a, b) => a + b, 0);
                        const average = sum / MA_PERIOD;
                        
                        if (average > 0) {
                            const disparity = (currentPrice / average) * 100;
                            disparityData.push(disparity);
                        } else {
                            disparityData.push(null);
                        }
                    } else {
                        // 1500일이 안 된 과거 데이터 기간은 빈칸 처리
                        disparityData.push(null);
                    }
                }

                renderChart(dates, prices, disparityData);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '데이터 연동에 실패했습니다.<br>잠시 후 다시 시도해 주세요.';
                document.getElementById('loading').style.color = 'red';
            }
        }

        function renderChart(labels, priceData, disparityData) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (window.myLineChart) {
                window.myLineChart.destroy();
            }
            
            window.myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TQQQ 수정종가 (로그형)',
                            data: priceData,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            yAxisID: 'y',
                            tension: 0.1
                        },
                        {
                            label: '1500일 이격도 (%)',
                            data: disparityData,
                            borderColor: '#e74c3c', // 붉은색
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2, // 이격도 선이 더 잘 보이도록 두께 강조
                            pointRadius: 0,
                            yAxisID: 'y1',
                            tension: 0.1,
                            spanGaps: true // 중간에 null이 있어도 끊기지 않게 연결
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += context.parsed.y.toFixed(2);
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        },
                        y: {
                            type: 'logarithmic', // 좌측 축: 주가 로그 스케일
                            display: true,
                            position: 'left',
                            title: { display: true, text: '수정종가 (USD)', color: '#3498db' }
                        },
                        y1: {
                            type: 'linear', // 우측 축: 이격도 % 선형 스케일
                            display: true,
                            position: 'right',
                            title: { display: true, text: '이격도 (%)', color: '#e74c3c' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        fetchAndRenderChart();
    </script>
</body>
</html>
